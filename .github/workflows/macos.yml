name: MacOS Build
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  workflow_dispatch:

  workflow_call:
    inputs:
      buildFlags:
        required: false
        type: string

jobs:
  build:
    name: MacOS Build (${{ matrix.arch.name }})
    permissions: write-all
    runs-on: macos-latest

    strategy:
      matrix:
        arch:
          - name: ARM64
            cacheKey: cache-build-macosarm
            compileFlag: -D HXCPP_ARM64
          - name: Intel
            cacheKey: cache-build-macosintel
            compileFlag: -D HXCPP_M64

    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Restore action cache
        uses: actions/cache/restore@main
        with:
          key: ${{ matrix.arch.cacheKey }}
          path: |
            .haxelib/
            export/release/macos/haxe/
            export/release/macos/obj/

      - name: Install libraries using hxpkg
        run: |
          haxelib install hxpkg --quiet
          haxelib run hxpkg install --force

      - name: Compile
        run: arch -x86_64 haxelib run lime build macos -64 ${{ matrix.arch.compileFlag }}

      - name: Tar files
        run: tar -zcvf AlterEngine.tar.gz -C export/release/macos/bin .

      - name: Uploading artifact
        uses: actions/upload-artifact@main
        with:
          name: Alter Engine (${{ matrix.arch.name }})
          path: AlterEngine.tar.gz
          if-no-files-found: error

      - name: Clearing already existing cache
        uses: actions/github-script@main
        with:
          script: |
            try {
            	const caches = await github.rest.actions.getActionsCacheList({
            		owner: context.repo.owner,
            		repo: context.repo.repo,
            	})
            	if (typeof caches.data.actions_caches != null && caches.data.actions_caches.length > 0) {
            		for (const cache of caches.data.actions_caches) {
            			if (cache.key == "${{ matrix.arch.cacheKey }}") {
            				console.log('Clearing ' + cache.key + '...')
            				await github.rest.actions.deleteActionsCacheById({
            					owner: context.repo.owner,
            					repo: context.repo.repo,
            					cache_id: cache.id,
            				})
            				console.log("Cache cleared.")
            			}
            		}
            	}
            } catch (error) {
            	console.log(error.message);
            }

      - name: Uploading new cache
        uses: actions/cache/save@main
        with:
          key: ${{ matrix.arch.cacheKey }}
          path: |
            .haxelib/
            export/release/macos/haxe/
            export/release/macos/obj/